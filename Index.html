    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }

</head>
<body class="bg-[#f8fafc]">

            <div class="flex items-center space-x-6">
                <button onclick="toggleSection('buy')" class="font-semibold text-gray-600 hover:text-blue-600">Sotib olish</button>

                    <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
            </div>
        </div>
    </nav>

    <section id="buy-section" class="pt-24 pb-12 px-6 max-w-7xl mx-auto">

        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-grid">
            </div>
    </section>

    <section id="sell-section" class="hidden pt-24 pb-12 px-6 max-w-xl mx-auto">

            <div class="space-y-4">
                <input type="text" id="p-name" placeholder="Mahsulot nomi" class="w-full p-3 rounded-xl border bg-gray-50 focus:ring-2 ring-blue-500 outline-none">
                <input type="number" id="p-price" placeholder="Narxi ($)" class="w-full p-3 rounded-xl border bg-gray-50 focus:ring-2 ring-blue-500 outline-none">
                <button onclick="postProduct()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">E'lonni joylashtirish</button>
            </div>
            
            <div class="mt-8 border-t pt-6">
                <h3 class="font-bold text-gray-500 mb-4">Sizning e'lonlaringiz:</h3>
                <div id="my-listings" class="space-y-3">
                    </div>
            </div>
        </div>
    </section>

    <div id="toast" class="toast fixed bottom-10 left-1/2 -translate-x-1/2 glass px-6 py-4 rounded-2xl shadow-2xl border border-blue-100 flex items-center space-x-4 z-[100]">
        <span id="toast-msg" class="text-sm font-medium">Amal bajarildi!</span>
        <button id="undo-btn" class="text-blue-600 font-bold text-sm underline hover:text-blue-800 transition">Qaytarish (Undo)</button>
    </div>
