<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernStore | Savdo & Tizim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .toast { transform: translateY(100px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <nav class="fixed w-full z-50 glass border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-blue-600">MODERN.</h1>
            <div class="flex items-center space-x-6">
                <button onclick="toggleSection('buy')" class="font-semibold text-gray-600 hover:text-blue-600">Sotib olish</button>
                <button onclick="toggleSection('sell')" class="font-semibold text-gray-600 hover:text-blue-600">Sotish (+)</button>
                <div class="relative">
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
            </div>
        </div>
    </nav>

    <section id="buy-section" class="pt-24 pb-12 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold mb-8">Barcha mahsulotlar</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-grid">
            </div>
    </section>

    <section id="sell-section" class="hidden pt-24 pb-12 px-6 max-w-xl mx-auto">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold mb-6">Mahsulot sotish</h2>
            <div class="space-y-4">
                <input type="text" id="p-name" placeholder="Mahsulot nomi" class="w-full p-3 rounded-xl border bg-gray-50 focus:ring-2 ring-blue-500 outline-none">
                <input type="number" id="p-price" placeholder="Narxi ($)" class="w-full p-3 rounded-xl border bg-gray-50 focus:ring-2 ring-blue-500 outline-none">
                <button onclick="postProduct()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">E'lonni joylashtirish</button>
            </div>
            
            <div class="mt-8 border-t pt-6">
                <h3 class="font-bold text-gray-500 mb-4">Sizning e'lonlaringiz:</h3>
                <div id="my-listings" class="space-y-3">
                    </div>
            </div>
        </div>
    </section>

    <div id="toast" class="toast fixed bottom-10 left-1/2 -translate-x-1/2 glass px-6 py-4 rounded-2xl shadow-2xl border border-blue-100 flex items-center space-x-4 z-[100]">
        <span id="toast-msg" class="text-sm font-medium">Amal bajarildi!</span>
        <button id="undo-btn" class="text-blue-600 font-bold text-sm underline hover:text-blue-800 transition">Qaytarish (Undo)</button>
    </div>

    <script>
        let cart = [];
        let myProducts = [];
        let lastAction = null; // Bekor qilish (Undo) uchun xotira

        const products = [
            { id: 1, name: 'iPhone 15 Pro', price: 999, img: 'https://images.unsplash.com/photo-1696446701796-da61225697cc?q=80&w=400' },
            { id: 2, name: 'MacBook Air M2', price: 1199, img: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=400' },
        ];

        // Bo'limlarni almashtirish
        function toggleSection(mode) {
            document.getElementById('buy-section').classList.toggle('hidden', mode === 'sell');
            document.getElementById('sell-section').classList.toggle('hidden', mode === 'buy');
        }

        // Mahsulotlarni chiqarish
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-xl mb-4">
                    <h3 class="font-bold text-lg">${p.name}</h3>
                    <p class="text-blue-600 font-bold mb-4">$${p.price}</p>
                    <button onclick="addToCart(${p.id})" class="w-full py-2 bg-gray-100 rounded-lg font-semibold hover:bg-blue-600 hover:text-white transition">Sotib olish</button>
                </div>
            `).join('');
        }

        // SAVATGA QO'SHISH (Sotib olish)
        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            updateUI();
            showToast(`"${item.name}" savatga qo'shildi`, () => {
                cart.pop();
                updateUI();
            });
        }

        // SOTISH (E'lon berish)
        function postProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;

            if(!name || !price) return alert("Ma'lumotni to'ldiring!");

            const newProduct = { id: Date.now(), name, price };
            myProducts.push(newProduct);
            
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            
            updateUI();
            showToast("Mahsulot sotuvga qo'yildi!", () => {
                myProducts.pop();
                updateUI();
            });
        }

        // UI YANGILASH
        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const myList = document.getElementById('my-listings');
            myList.innerHTML = myProducts.map(p => `
                <div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <span class="font-medium">${p.name} - $${p.price}</span>
                    <button onclick="removeListing(${p.id})" class="text-red-500 text-xs font-bold">O'chirish</button>
                </div>
            `).join('');
        }

        function removeListing(id) {
            const index = myProducts.findIndex(p => p.id === id);
            const removedItem = myProducts.splice(index, 1)[0];
            updateUI();
            showToast("E'lon o'chirildi", () => {
                myProducts.splice(index, 0, removedItem);
                updateUI();
            });
        }

        // TOAST & UNDO LOGIKASI
        function showToast(msg, undoAction) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            
            lastAction = undoAction;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        document.getElementById('undo-btn').onclick = () => {
            if(lastAction) {
                lastAction();
                lastAction = null;
                document.getElementById('toast').classList.remove('show');
            }
        };

        renderProducts();
    </script>
</body>
</html>
